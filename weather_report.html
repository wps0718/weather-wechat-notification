
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#90a4ae">
        <title>今日天气提醒</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            :root {
                --text-color: #1a1a2e;
                --secondary-text-color: #555;
                --bg-color: #f4f6f8;
                --glass-bg: rgba(255, 255, 255, 0.18);
                --glass-border: rgba(255, 255, 255, 0.25);
                --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.10);
                --glass-radius: 20px;

                --theme-primary: #007bff;
                --theme-gradient-start: #89f7fe;
                --theme-gradient-end: #66a6ff;
                --theme-glass-tint: rgba(102, 166, 255, 0.06);
            }

            /* --- 动态天气主题定义 --- */
            .theme-sunny {
                --theme-primary: #ff9800;
                --theme-gradient-start: #ffeb3b;
                --theme-gradient-end: #ff9800;
                --bg-color: #fff8e1;
                --theme-glass-tint: rgba(255, 152, 0, 0.06);
            }
            .theme-rainy {
                --theme-primary: #0277bd;
                --theme-gradient-start: #4fc3f7;
                --theme-gradient-end: #0288d1;
                --bg-color: #e1f5fe;
                --theme-glass-tint: rgba(2, 136, 209, 0.06);
            }
            .theme-cloudy {
                --theme-primary: #546e7a;
                --theme-gradient-start: #90a4ae;
                --theme-gradient-end: #607d8b;
                --bg-color: #eceff1;
                --theme-glass-tint: rgba(96, 125, 139, 0.06);
            }
            .theme-snowy {
                --theme-primary: #78909c;
                --theme-gradient-start: #eceff1;
                --theme-gradient-end: #b0bec5;
                --text-color: #263238;
                --secondary-text-color: #455a64;
                --bg-color: #f5f5f5;
                --theme-glass-tint: rgba(176, 190, 197, 0.06);
            }
            .theme-foggy {
                --theme-primary: #757575;
                --theme-gradient-start: #bdbdbd;
                --theme-gradient-end: #9e9e9e;
                --bg-color: #f5f5f5;
                --theme-glass-tint: rgba(158, 158, 158, 0.06);
            }
            .theme-default {
                --theme-primary: #1976d2;
                --theme-gradient-start: #64b5f6;
                --theme-gradient-end: #1976d2;
                --bg-color: #e3f2fd;
                --theme-glass-tint: rgba(25, 118, 210, 0.06);
            }

            /* --- Fallback 浏览器不支持 backdrop-filter 时的降级 --- */
            @supports not ((backdrop-filter: blur(20px)) or (-webkit-backdrop-filter: blur(20px))) {
                .glass-card {
                    background: rgba(255, 255, 255, 0.88) !important;
                    backdrop-filter: none !important;
                    -webkit-backdrop-filter: none !important;
                }
            }

            /* ===== 动画 ===== */
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-6px); }
            }

            /* ===== 全局基础样式 ===== */
            body {
                padding: 16px;
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto,
                             "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
                min-height: 100vh;
                overflow-x: hidden;
            }

            .container {
                max-width: 420px;
                margin: 0 auto;
                animation: fadeIn 0.6s ease-out;
            }

            /* ===== Glass Card 基类 ===== */
            .glass-card {
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: var(--glass-radius);
                box-shadow: var(--glass-shadow);
            }

            /* ===== Header 区域 ===== */
            .header {
                position: relative;
                background: linear-gradient(135deg, var(--theme-gradient-start) 0%, var(--theme-gradient-end) 100%);
                color: white;
                padding: 32px 24px 28px;
                border-radius: 24px;
                text-align: center;
                margin-bottom: 16px;
                overflow: hidden;
                isolation: isolate;
            }
            .header::before {
                content: '';
                position: absolute;
                top: -40%;
                right: -20%;
                width: 200px;
                height: 200px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.10);
                z-index: 0;
            }
            .header::after {
                content: '';
                position: absolute;
                bottom: -35%;
                left: -15%;
                width: 160px;
                height: 160px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.07);
                z-index: 0;
            }
            .header-content {
                position: relative;
                z-index: 1;
            }
            .header .weather-emoji {
                font-size: 40px;
                display: block;
                margin-bottom: 10px;
                animation: float 4s ease-in-out infinite;
                filter: drop-shadow(0 4px 8px rgba(0,0,0,0.10));
            }
            .header h1 {
                margin: 0;
                font-size: 20px;
                font-weight: 600;
                letter-spacing: 0.5px;
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            }
            .header .date {
                margin: 8px 0 0;
                font-size: 13px;
                opacity: 0.80;
                font-weight: 400;
                letter-spacing: 0.3px;
            }

            /* ===== 预警卡片 ===== */
            .alerts-card {
                padding: 14px 18px;
                margin-bottom: 16px;
                border-left: 4px solid var(--theme-primary);
            }
            .alerts-header {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 15px;
                font-weight: 600;
                color: var(--theme-primary);
            }
            .alerts-header svg {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
            }
            .alerts-card ul {
                padding-left: 26px;
                margin: 8px 0 0;
                font-size: 13px;
                color: var(--secondary-text-color);
                list-style-type: disc;
            }
            .alerts-card li {
                margin-bottom: 4px;
                line-height: 1.6;
            }
            .alerts-card li:last-child { margin-bottom: 0; }

            /* ===== 主天气信息卡片 ===== */
            .main-card {
                padding: 32px 20px 28px;
                text-align: center;
                margin-bottom: 16px;
                background: linear-gradient(160deg, var(--glass-bg), rgba(255, 255, 255, 0.06));
            }
            .main-card .temperature {
                font-size: 56px;
                font-weight: 700;
                color: var(--text-color);
                line-height: 1;
                letter-spacing: -1px;
            }
            .main-card .condition {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                font-size: 18px;
                font-weight: 500;
                color: var(--secondary-text-color);
                margin-top: 10px;
            }
            .main-card .condition-icon {
                font-size: 24px;
            }
            .main-card .condition-tip {
                font-size: 13px;
                color: var(--secondary-text-color);
                margin-top: 14px;
                max-width: 85%;
                margin-left: auto;
                margin-right: auto;
                opacity: 0.75;
                line-height: 1.7;
            }

            /* ===== 详情网格（2×2） ===== */
            .detail-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 16px;
            }
            .detail-card {
                padding: 20px 14px 18px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 6px;
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 18px;
                box-shadow: var(--glass-shadow);
                min-height: 110px;
                justify-content: center;
            }
            .detail-card .detail-icon {
                font-size: 24px;
                line-height: 1;
            }
            .detail-card .detail-label {
                font-weight: 500;
                color: var(--theme-primary);
                font-size: 12px;
                letter-spacing: 0.5px;
                opacity: 0.75;
            }
            .detail-card .detail-value {
                font-weight: 600;
                font-size: 16px;
                color: var(--text-color);
                line-height: 1.4;
            }
            .detail-card .detail-sub {
                font-size: 12px;
                color: var(--secondary-text-color);
                opacity: 0.7;
            }

            /* --- 紫外线进度条 --- */
            .uv-bar-wrapper {
                width: 100%;
                max-width: 110px;
                height: 4px;
                background: rgba(0, 0, 0, 0.06);
                border-radius: 4px;
                margin-top: 4px;
                overflow: hidden;
            }
            .uv-bar-fill {
                height: 100%;
                border-radius: 4px;
                transition: width 0.8s ease;
            }
            .uv-level-1 { background: linear-gradient(90deg, #4caf50, #8bc34a); width: 20%; }
            .uv-level-2 { background: linear-gradient(90deg, #8bc34a, #ffeb3b); width: 40%; }
            .uv-level-3 { background: linear-gradient(90deg, #ffeb3b, #ff9800); width: 60%; }
            .uv-level-4 { background: linear-gradient(90deg, #ff9800, #f44336); width: 80%; }
            .uv-level-5 { background: linear-gradient(90deg, #f44336, #d32f2f); width: 100%; }

            /* ===== Footer 页脚 ===== */
            .footer-card {
                padding: 20px;
                text-align: center;
                margin-bottom: 16px;
            }
            .footer-card p {
                font-size: 14px;
                color: var(--secondary-text-color);
                line-height: 1.7;
            }
            .footer-card .footer-icon {
                display: inline-block;
                animation: float 3s ease-in-out infinite;
            }

            /* ===== 装饰性背景光晕 ===== */
            .bg-decoration {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: -1;
                overflow: hidden;
            }
            .bg-decoration .orb {
                position: absolute;
                border-radius: 50%;
                opacity: 0.12;
                filter: blur(60px);
            }
            .bg-decoration .orb-1 {
                top: -8%;
                right: -8%;
                width: 250px;
                height: 250px;
                background: var(--theme-gradient-start);
            }
            .bg-decoration .orb-2 {
                bottom: -8%;
                left: -8%;
                width: 200px;
                height: 200px;
                background: var(--theme-gradient-end);
            }
        </style>
    </head>
    <body class="theme-cloudy">
        <!-- 背景装饰光晕 -->
        <div class="bg-decoration">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <div class="container">
            <!-- 头部问候 -->
            <div class="header">
                <div class="header-content">
                    <span class="weather-emoji">☁️</span>
                    <h1>上午好呀！工作学习也要记得适当休息哦~</h1>
                    <p class="date">2026年06月20日 Saturday</p>
                </div>
            </div>

            <!-- 智能预警（如有） -->
            
    <div class="alerts-card glass-card">
        <div class="alerts-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <span>今日特别提醒</span>
        </div>
        <ul><li>紫外线强(6级)，请注意防晒</li></ul>
    </div>
    

            <!-- 主天气卡片 -->
            <div class="main-card glass-card">
                <div class="temperature">26℃ ~ 33℃</div>
                <div class="condition">
                    <span class="condition-icon">☁️</span>
                    <span>多云</span>
                </div>
                <p class="condition-tip">今天天气多云，祝你事事顺心~。爱你仪姐，明天见</p>
            </div>

            <!-- 详情网格 -->
            <div class="detail-grid">
                <div class="detail-card">
                    <span class="detail-icon">🌬️</span>
                    <span class="detail-label">风力风向</span>
                    <span class="detail-value">南风 3级</span>
                </div>
                <div class="detail-card">
                    <span class="detail-icon">💧</span>
                    <span class="detail-label">降水情况</span>
                    <span class="detail-value">当前无降水</span>
                </div>
                <div class="detail-card">
                    <span class="detail-icon">☀️</span>
                    <span class="detail-label">紫外线指数</span>
                    <span class="detail-value">6 </span>
                    <div class="uv-bar-wrapper">
                        <div class="uv-bar-fill uv-level-3"></div>
                    </div>
                </div>
                <div class="detail-card">
                    <span class="detail-icon">🌡️</span>
                    <span class="detail-label">体感提示</span>
                    <span class="detail-value">天气炎热，注意防暑降温，多补充水分哦~</span>
                </div>
            </div>

            <!-- 页脚寄语 -->
            <div class="footer-card glass-card">
                <p><span class="footer-icon">💖</span> 仪姐，今天是最年轻的一天，当然要开心地过呀🎉</p>
            </div>
        </div>
    </body>
    </html>
